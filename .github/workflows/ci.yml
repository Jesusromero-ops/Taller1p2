name: Verificación Taller 1 - Sistema Bancario

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB PÚBLICO: los estudiantes ven esto
  # Solo muestra si pasó o falló, sin nota
  # ─────────────────────────────────────────────
  verificacion-publica:
    name: ✅ Verificación del Proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📁 Verificar estructura de archivos
        run: |
          echo "🔍 Verificando estructura..."
          ERRORES=0
          archivos=(
            "src/modelo/abstractas/Persona.java"
            "src/modelo/abstractas/Empleado.java"
            "src/modelo/abstractas/Cuenta.java"
            "src/modelo/personas/ClienteNatural.java"
            "src/modelo/personas/ClienteEmpresarial.java"
            "src/modelo/empleados/Cajero.java"
            "src/modelo/empleados/AsesorFinanciero.java"
            "src/modelo/empleados/GerenteSucursal.java"
            "src/modelo/cuentas/CuentaCorriente.java"
            "src/modelo/cuentas/CuentaAhorros.java"
            "src/modelo/cuentas/CuentaCredito.java"
            "src/modelo/banco/Banco.java"
            "src/modelo/banco/Transaccion.java"
            "src/modelo/interfaces/Consultable.java"
            "src/modelo/interfaces/Transaccionable.java"
            "src/modelo/interfaces/Auditable.java"
            "src/modelo/interfaces/Notificable.java"
            "src/modelo/excepciones/SistemaBancarioException.java"
            "src/modelo/excepciones/BancoRuntimeException.java"
            "src/modelo/excepciones/SaldoInsuficienteException.java"
            "src/modelo/excepciones/CuentaBloqueadaException.java"
            "src/modelo/excepciones/ClienteNoEncontradoException.java"
            "src/modelo/excepciones/CapacidadExcedidaException.java"
            "src/modelo/excepciones/DatoInvalidoException.java"
            "src/modelo/excepciones/EstadoTransaccionInvalidoException.java"
            "src/modelo/excepciones/PermisoInsuficienteException.java"
            "src/modelo/enums/EstadoTransaccion.java"
            "src/modelo/enums/TipoCuenta.java"
            "src/modelo/enums/Turno.java"
            "src/modelo/enums/TipoDocumento.java"
            "src/principal/SistemaBancarioDemo.java"
          )
          for archivo in "${archivos[@]}"; do
            if [ ! -f "$archivo" ]; then
              echo "❌ Falta: $archivo"
              ERRORES=$((ERRORES + 1))
            fi
          done
          if [ $ERRORES -eq 0 ]; then
            echo "✅ Todos los archivos requeridos están presentes."
          else
            echo "⚠️ Faltan $ERRORES archivo(s). Revisa la estructura de paquetes."
            exit 1
          fi

      - name: ☕ Compilar proyecto
        run: |
          mkdir -p out
          find src -name "*.java" > fuentes.txt
          echo "📄 $(wc -l < fuentes.txt) archivos .java encontrados"
          javac -encoding UTF-8 -d out @fuentes.txt
          echo "✅ Compilación exitosa."

      - name: 🔒 Verificar restricciones técnicas
        run: |
          ERRORES=0

          COLECCIONES=$(grep -rn "ArrayList\|LinkedList\|java\.util\.List\|java\.util\.Map\|java\.util\.Set" src/ --include="*.java" | grep -v "^\s*//" || true)
          if [ -n "$COLECCIONES" ]; then
            echo "❌ Se encontraron colecciones prohibidas (ArrayList, List, etc.)"
            ERRORES=$((ERRORES + 1))
          else
            echo "✅ Sin colecciones prohibidas."
          fi

          VAR_USO=$(grep -rn "\bvar\b" src/ --include="*.java" | grep -v "^\s*//" || true)
          if [ -n "$VAR_USO" ]; then
            echo "❌ Se encontró uso de 'var' (prohibido)."
            ERRORES=$((ERRORES + 1))
          else
            echo "✅ Sin uso de 'var'."
          fi

          DATE_USO=$(grep -rn "java\.util\.Date\|new Date()" src/ --include="*.java" | grep -v "^\s*//" || true)
          if [ -n "$DATE_USO" ]; then
            echo "❌ Se encontró uso de java.util.Date (prohibido)."
            ERRORES=$((ERRORES + 1))
          else
            echo "✅ Sin uso de java.util.Date."
          fi

          if [ $ERRORES -gt 0 ]; then
            echo "⚠️ Se encontraron $ERRORES restricción(es) incumplida(s)."
            exit 1
          fi

      - name: 🚀 Ejecutar demo
        run: |
          timeout 30 java -cp out principal.SistemaBancarioDemo > /dev/null 2>&1
          echo "✅ La clase principal ejecutó correctamente."

  # ─────────────────────────────────────────────
  # JOB PRIVADO: genera el reporte con nota
  # Solo el dueño del repo puede descargarlo
  # ─────────────────────────────────────────────
  reporte-docente:
    name: 📊 Reporte Docente (privado)
    runs-on: ubuntu-latest
    needs: verificacion-publica
    if: always()  # corre aunque el job anterior falle

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar reporte con nota
        run: |
          mkdir -p reporte
          REPORTE="reporte/informe_calificacion.txt"

          RAMA="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          ACTOR="${GITHUB_ACTOR}"
          FECHA=$(date '+%Y-%m-%d %H:%M:%S')

          {
            echo "=================================================="
            echo "   📋 REPORTE DOCENTE - TALLER 1"
            echo "   Sistema de Gestión Bancaria"
            echo "=================================================="
            echo "  Rama      : $RAMA"
            echo "  Commit    : $COMMIT"
            echo "  Usuario   : $ACTOR"
            echo "  Fecha     : $FECHA"
            echo "=================================================="
            echo ""
          } >> "$REPORTE"

          PUNTOS=0
          TOTAL=50

          # BLOQUE 1: Estructura (15 pts)
          archivos=(
            "src/modelo/abstractas/Persona.java"
            "src/modelo/abstractas/Empleado.java"
            "src/modelo/abstractas/Cuenta.java"
            "src/modelo/personas/ClienteNatural.java"
            "src/modelo/personas/ClienteEmpresarial.java"
            "src/modelo/empleados/Cajero.java"
            "src/modelo/empleados/AsesorFinanciero.java"
            "src/modelo/empleados/GerenteSucursal.java"
            "src/modelo/cuentas/CuentaCorriente.java"
            "src/modelo/cuentas/CuentaAhorros.java"
            "src/modelo/cuentas/CuentaCredito.java"
            "src/modelo/banco/Banco.java"
            "src/modelo/banco/Transaccion.java"
            "src/modelo/interfaces/Consultable.java"
            "src/modelo/interfaces/Transaccionable.java"
            "src/modelo/interfaces/Auditable.java"
            "src/modelo/interfaces/Notificable.java"
            "src/modelo/excepciones/SistemaBancarioException.java"
            "src/modelo/excepciones/BancoRuntimeException.java"
            "src/modelo/excepciones/SaldoInsuficienteException.java"
            "src/modelo/excepciones/CuentaBloqueadaException.java"
            "src/modelo/excepciones/ClienteNoEncontradoException.java"
            "src/modelo/excepciones/CapacidadExcedidaException.java"
            "src/modelo/excepciones/DatoInvalidoException.java"
            "src/modelo/excepciones/EstadoTransaccionInvalidoException.java"
            "src/modelo/excepciones/PermisoInsuficienteException.java"
            "src/modelo/enums/EstadoTransaccion.java"
            "src/modelo/enums/TipoCuenta.java"
            "src/modelo/enums/Turno.java"
            "src/modelo/enums/TipoDocumento.java"
            "src/principal/SistemaBancarioDemo.java"
          )
          TOTAL_ARCHIVOS=${#archivos[@]}
          ARCHIVOS_OK=0
          for archivo in "${archivos[@]}"; do
            if [ -f "$archivo" ]; then ARCHIVOS_OK=$((ARCHIVOS_OK + 1)); fi
          done
          DOCS_OK="NO"
          if [ -d "docs" ]; then DOCS_OK="SÍ"; fi
          PUNTOS_ESTRUCTURA=$(( (ARCHIVOS_OK * 15) / TOTAL_ARCHIVOS ))
          PUNTOS=$((PUNTOS + PUNTOS_ESTRUCTURA))
          {
            echo "📁 BLOQUE 1 — Estructura de archivos"
            echo "  Archivos presentes : $ARCHIVOS_OK / $TOTAL_ARCHIVOS"
            echo "  Carpeta /docs      : $DOCS_OK"
            echo "  Puntos             : $PUNTOS_ESTRUCTURA / 15"
            echo ""
          } >> "$REPORTE"

          # BLOQUE 2: Compilación (15 pts)
          mkdir -p out
          find src -name "*.java" > fuentes.txt 2>/dev/null || true
          PUNTOS_COMPILACION=0
          if javac -encoding UTF-8 -d out @fuentes.txt 2>err_comp.txt; then
            PUNTOS_COMPILACION=15
            COMP_ESTADO="✅ Exitosa"
          else
            CLASES=$(find out -name "*.class" | wc -l)
            if [ "$CLASES" -gt 0 ]; then
              PUNTOS_COMPILACION=5
              COMP_ESTADO="⚠️ Parcial ($CLASES clases)"
            else
              COMP_ESTADO="❌ Falló"
            fi
          fi
          PUNTOS=$((PUNTOS + PUNTOS_COMPILACION))
          {
            echo "☕ BLOQUE 2 — Compilación"
            echo "  Estado  : $COMP_ESTADO"
            echo "  Puntos  : $PUNTOS_COMPILACION / 15"
            echo ""
          } >> "$REPORTE"

          # BLOQUE 3: Restricciones (10 pts)
          PUNTOS_RESTRICCIONES=10
          RESTA=0
          COLECCIONES=$(grep -rn "ArrayList\|LinkedList\|java\.util\.List" src/ --include="*.java" | grep -v "^\s*//" || true)
          VAR_USO=$(grep -rn "\bvar\b" src/ --include="*.java" | grep -v "^\s*//" || true)
          DATE_USO=$(grep -rn "java\.util\.Date" src/ --include="*.java" | grep -v "^\s*//" || true)
          [ -n "$COLECCIONES" ] && RESTA=$((RESTA + 3))
          [ -n "$VAR_USO" ] && RESTA=$((RESTA + 2))
          [ -n "$DATE_USO" ] && RESTA=$((RESTA + 2))

          SIN_SUPER=0
          for f in src/modelo/empleados/Cajero.java src/modelo/empleados/AsesorFinanciero.java src/modelo/empleados/GerenteSucursal.java src/modelo/personas/ClienteNatural.java src/modelo/personas/ClienteEmpresarial.java src/modelo/cuentas/CuentaCorriente.java src/modelo/cuentas/CuentaAhorros.java src/modelo/cuentas/CuentaCredito.java; do
            if [ -f "$f" ] && ! grep -q "super(" "$f"; then
              SIN_SUPER=$((SIN_SUPER + 1))
            fi
          done
          RESTA=$((RESTA + SIN_SUPER))
          PUNTOS_RESTRICCIONES=$((PUNTOS_RESTRICCIONES - RESTA))
          if [ $PUNTOS_RESTRICCIONES -lt 0 ]; then PUNTOS_RESTRICCIONES=0; fi
          PUNTOS=$((PUNTOS + PUNTOS_RESTRICCIONES))
          {
            echo "🔒 BLOQUE 3 — Restricciones técnicas"
            echo "  Colecciones prohibidas : $([ -n "$COLECCIONES" ] && echo "❌ Encontradas" || echo "✅ OK")"
            echo "  Uso de var             : $([ -n "$VAR_USO" ] && echo "❌ Encontrado" || echo "✅ OK")"
            echo "  java.util.Date         : $([ -n "$DATE_USO" ] && echo "❌ Encontrado" || echo "✅ OK")"
            echo "  Clases sin super()     : $SIN_SUPER"
            echo "  Puntos                 : $PUNTOS_RESTRICCIONES / 10"
            echo ""
          } >> "$REPORTE"

          # BLOQUE 4: Demo (10 pts)
          PUNTOS_DEMO=0
          if [ -f "out/principal/SistemaBancarioDemo.class" ]; then
            if timeout 30 java -cp out principal.SistemaBancarioDemo > salida.txt 2>&1; then
              PUNTOS_DEMO=10
              DEMO_ESTADO="✅ Ejecutó correctamente"
            else
              DEMO_ESTADO="❌ Error en ejecución"
            fi
          else
            DEMO_ESTADO="⚠️ No compila, no se puede ejecutar"
          fi
          PUNTOS=$((PUNTOS + PUNTOS_DEMO))
          {
            echo "🚀 BLOQUE 4 — Ejecución demo"
            echo "  Estado  : $DEMO_ESTADO"
            echo "  Puntos  : $PUNTOS_DEMO / 10"
            echo ""
          } >> "$REPORTE"

          # NOTA FINAL
          NOTA=$(echo "scale=1; $PUNTOS * 5 / $TOTAL" | bc)
          {
            echo "=================================================="
            echo "   ⭐ NOTA SUGERIDA: $NOTA / 5.0"
            echo "   🔢 Puntaje bruto : $PUNTOS / $TOTAL"
            echo ""
            echo "   Estructura  : $PUNTOS_ESTRUCTURA/15"
            echo "   Compilación : $PUNTOS_COMPILACION/15"
            echo "   Restricciones: $PUNTOS_RESTRICCIONES/10"
            echo "   Demo        : $PUNTOS_DEMO/10"
            echo ""
            echo "   ⚠️  Nota de referencia — el docente"
            echo "       ajusta según lógica, UML y sustentación."
            echo "=================================================="
          } >> "$REPORTE"

          cat "$REPORTE"

      - name: 📥 Guardar reporte como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.ref_name }}-${{ github.sha }}
          path: reporte/informe_calificacion.txt
          retention-days: 90
